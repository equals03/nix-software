name: Update Flake Lock

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 3"
  pull_request:
    types: [closed]
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

env:
  UPDATE_BRANCH: update-flake-lock
  EXTRA_SUBSTITUTERS: https://nix-community.cachix.org
  EXTRA_TRUSTED_PUBLIC_KEYS: nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

concurrency:
  group: update-flake-lock
  cancel-in-progress: false

jobs:
  update-flake-lock:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    environment: default

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.5
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = ${{ env.EXTRA_SUBSTITUTERS }}
            extra-trusted-public-keys = ${{ env.EXTRA_TRUSTED_PUBLIC_KEYS }}
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Update flake.lock
        shell: bash
        run: |
          set -euo pipefail
          nix flake update

      - name: Update non-flake package inputs
        shell: bash
        run: |
          set -euo pipefail
          nix run .#update-packages

      - name: Create update PR
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          branch: ${{ env.UPDATE_BRANCH }}
          base: master
          title: "flake.lock: update"
          commit-message: "flake.lock: update"
          labels: |
            dependencies
            automated
            flake
          body: |
            This updates:
            - flake inputs via `nix flake update`
            - non-flake package inputs via `nix run .#update-packages`

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
        run: |
          set -euo pipefail

          gh pr merge "${{ steps.create-pr.outputs.pull-request-number }}" \
            --auto \
            --squash \
            --match-head-commit "${{ steps.create-pr.outputs.pull-request-head-sha }}"

  cleanup-update-branch:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Delete update branch if it exists
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          REPO: ${{ github.repository }}
          UPDATE_BRANCH: ${{ env.UPDATE_BRANCH }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          if [[ "$PR_HEAD_REF" != "$UPDATE_BRANCH" ]]; then
            echo "Not deleting branch '$PR_HEAD_REF'; expected '$UPDATE_BRANCH'."
            exit 0
          fi

          if gh api "repos/$REPO/git/ref/heads/$UPDATE_BRANCH" >/dev/null 2>&1; then
            gh api -X DELETE "repos/$REPO/git/refs/heads/$UPDATE_BRANCH"
            echo "Deleted branch: $UPDATE_BRANCH"
          else
            echo "Branch does not exist: $UPDATE_BRANCH"
          fi
